name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-functions.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Supabase
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate Supabase secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Missing GitHub secret SUPABASE_ACCESS_TOKEN (Supabase Dashboard → Account → Access Tokens)."
            exit 1
          fi
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::Missing GitHub secret SUPABASE_PROJECT_ID (project ref from https://supabase.com/dashboard/project/_/settings/general)."
            exit 1
          fi

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Deploy weather function
        run: |
          supabase functions deploy weather \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --no-verify-jwt \
            --use-api

      - name: Deploy weather-alerts function
        run: |
          supabase functions deploy weather-alerts \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --use-api
