name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-functions.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Supabase
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_PROJECT_REF_ALT: ${{ secrets.SUPABASE_PROJECT_REF }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Supabase project ref
        run: |
          REF="${SUPABASE_PROJECT_ID:-}"
          if [ -z "$REF" ]; then REF="${SUPABASE_PROJECT_REF_ALT:-}"; fi
          if [ -z "$REF" ] && [ -n "$VITE_SUPABASE_URL" ]; then
            REF=$(echo "$VITE_SUPABASE_URL" | sed -nE 's|https?://([a-z0-9]+)\.supabase\.co.*|\1|p')
            echo "Derived project ref from VITE_SUPABASE_URL"
          fi
          if echo "$REF" | grep -qE 'supabase\.co'; then
            REF=$(echo "$REF" | sed -nE 's|https?://([a-z0-9]+)\.supabase\.co.*|\1|p')
            echo "Extracted project ref from Supabase URL value"
          fi
          REF=$(echo "$REF" | tr -d '[:space:]')
          if [ -n "$REF" ]; then
            echo "SUPABASE_PROJECT_REF=$REF" >> "$GITHUB_ENV"
          fi

      - name: Validate Supabase configuration
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Missing GitHub secret SUPABASE_ACCESS_TOKEN."
            echo "::error::Add at https://github.com/otherken-pixel/weartoday/settings/secrets/actions"
            exit 1
          fi
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::Missing project ref. Add a repository secret named exactly SUPABASE_PROJECT_ID"
            echo "::error::(Supabase → Project Settings → General → Reference ID, ~20 chars)."
            echo "::error::Also accepted: SUPABASE_PROJECT_REF, or VITE_SUPABASE_URL=https://<ref>.supabase.co"
            echo "::error::See docs/SUPABASE_DEPLOY.md"
            exit 1
          fi
          echo "Supabase token present; project ref length=${#SUPABASE_PROJECT_REF}"

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Deploy weather function
        run: |
          supabase functions deploy weather \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --no-verify-jwt \
            --use-api

      - name: Deploy weather-alerts function
        run: |
          supabase functions deploy weather-alerts \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --use-api
