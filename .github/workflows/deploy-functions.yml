name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-functions.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Supabase
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_ID }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Supabase project ref
        run: |
          if [ -z "$SUPABASE_PROJECT_REF" ] && [ -n "$VITE_SUPABASE_URL" ]; then
            REF=$(echo "$VITE_SUPABASE_URL" | sed -nE 's|https?://([a-z0-9]+)\.supabase\.co.*|\1|p')
            if [ -n "$REF" ]; then
              echo "Derived project ref from VITE_SUPABASE_URL"
              echo "SUPABASE_PROJECT_REF=$REF" >> "$GITHUB_ENV"
            fi
          fi

      - name: Validate Supabase configuration
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Missing GitHub secret SUPABASE_ACCESS_TOKEN."
            echo "::error::Create one at https://supabase.com/dashboard/account/tokens"
            echo "::error::Then add it at https://github.com/otherken-pixel/weartoday/settings/secrets/actions"
            echo "::error::See docs/SUPABASE_DEPLOY.md in this repo."
            exit 1
          fi
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::Missing project ref. Add secret SUPABASE_PROJECT_ID (Settings → General in Supabase),"
            echo "::error::or set VITE_SUPABASE_URL to https://<ref>.supabase.co in GitHub Actions secrets."
            echo "::error::See docs/SUPABASE_DEPLOY.md"
            exit 1
          fi
          echo "Project ref resolved (length ${#SUPABASE_PROJECT_REF})"

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Deploy weather function
        run: |
          supabase functions deploy weather \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --no-verify-jwt \
            --use-api

      - name: Deploy weather-alerts function
        run: |
          supabase functions deploy weather-alerts \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --use-api
