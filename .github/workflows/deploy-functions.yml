name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-functions.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Supabase
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_PROJECT_REF_ALT: ${{ secrets.SUPABASE_PROJECT_REF }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Supabase project ref
        run: |
          REF="${SUPABASE_PROJECT_ID:-}"
          if [ -z "$REF" ]; then REF="${SUPABASE_PROJECT_REF_ALT:-}"; fi
          if [ -z "$REF" ] && [ -n "$VITE_SUPABASE_URL" ]; then
            REF=$(echo "$VITE_SUPABASE_URL" | sed -nE 's|https?://([a-z0-9]+)\.supabase\.co.*|\1|p')
            echo "Derived project ref from VITE_SUPABASE_URL"
          fi
          if echo "$REF" | grep -qE 'supabase\.co'; then
            REF=$(echo "$REF" | sed -nE 's|https?://([a-z0-9]+)\.supabase\.co.*|\1|p')
            echo "Extracted project ref from Supabase URL value"
          fi
          REF=$(echo "$REF" | tr -d '[:space:]')
          if [ -n "$REF" ]; then
            echo "SUPABASE_PROJECT_REF=$REF" >> "$GITHUB_ENV"
          fi

      - name: Validate Supabase configuration
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Missing GitHub secret SUPABASE_ACCESS_TOKEN."
            echo "::error::Add at https://github.com/otherken-pixel/weartoday/settings/secrets/actions"
            exit 1
          fi
          case "$SUPABASE_ACCESS_TOKEN" in
            sbp_*)
              ;;
            *)
              echo "::error::SUPABASE_ACCESS_TOKEN must be a Personal Access Token (starts with sbp_)."
              echo "::error::Create one: https://supabase.com/dashboard/account/tokens"
              echo "::error::Do NOT use the anon key, service_role JWT, or project reference ID here."
              if [ "${SUPABASE_ACCESS_TOKEN#eyJ}" != "$SUPABASE_ACCESS_TOKEN" ]; then
                echo "::error::Detected a JWT — that belongs in VITE_SUPABASE_ANON_KEY, not SUPABASE_ACCESS_TOKEN."
              fi
              exit 1
              ;;
          esac
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::Missing project ref. Add SUPABASE_PROJECT_ID or SUPABASE_PROJECT_REF (~20-char ref from Supabase Settings → General)."
            echo "::error::See docs/SUPABASE_DEPLOY.md"
            exit 1
          fi
          case "$SUPABASE_PROJECT_REF" in
            sbp_*)
              echo "::error::SUPABASE_PROJECT_REF looks like an access token (sbp_...). Swap secrets:"
              echo "::error::  SUPABASE_ACCESS_TOKEN = personal token (sbp_...)"
              echo "::error::  SUPABASE_PROJECT_REF or SUPABASE_PROJECT_ID = project reference id"
              exit 1
              ;;
            eyJ*)
              echo "::error::SUPABASE_PROJECT_REF looks like a JWT API key. Use the project Reference ID instead."
              exit 1
              ;;
          esac
          echo "Supabase token OK; project ref length=${#SUPABASE_PROJECT_REF}"

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Deploy weather function
        run: |
          supabase functions deploy weather \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --no-verify-jwt \
            --use-api

      - name: Deploy weather-alerts function
        run: |
          supabase functions deploy weather-alerts \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --use-api

      - name: Sync WEATHER_ALERTS_SECRET to Supabase (if configured)
        env:
          WEATHER_ALERTS_SECRET: ${{ secrets.WEATHER_ALERTS_SECRET }}
        run: |
          if [ -n "$WEATHER_ALERTS_SECRET" ]; then
            supabase secrets set WEATHER_ALERTS_SECRET="$WEATHER_ALERTS_SECRET" --project-ref "$SUPABASE_PROJECT_REF"
            echo "WEATHER_ALERTS_SECRET synced to Supabase Edge secrets"
          else
            echo "WEATHER_ALERTS_SECRET GitHub secret not set — weather-alerts endpoint will reject all requests until set"
            echo "Add WEATHER_ALERTS_SECRET to GitHub Secrets and re-run this workflow, then update your cron job to pass x-alerts-secret header"
          fi

      - name: Sync GEMINI_API_KEY to Supabase (if configured)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "$GEMINI_API_KEY" ]; then
            supabase secrets set GEMINI_API_KEY="$GEMINI_API_KEY" --project-ref "$SUPABASE_PROJECT_REF"
            echo "GEMINI_API_KEY synced to Supabase Edge secrets"
          else
            echo "GEMINI_API_KEY GitHub secret not set — skip sync (set in Supabase Dashboard manually)"
          fi

      - name: Deploy packing-insights function
        run: |
          supabase functions deploy packing-insights \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --use-api

      - name: Deploy noaa-forecast function
        run: |
          supabase functions deploy noaa-forecast \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --no-verify-jwt \
            --use-api
